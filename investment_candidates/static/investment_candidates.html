<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AQuantAI 投资候选研究</title>
  <link rel="stylesheet" href="/investment-candidates/static/investment_candidates.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">AQuantAI · Investment Candidate Intelligence v1</p>
      <h1>投资候选研究</h1>
      <p>在保留完整产业受益公司池的前提下，透明展示当前研究优先级、估值语境、催化与风险。</p>
      <p class="notice">仅用于研究辅助，不构成买入、卖出、持有、目标价、收益或仓位建议。</p>
    </header>
    <section class="panel controls" aria-labelledby="query-title">
      <h2 id="query-title">读取固定快照</h2>
      <form id="snapshot-form">
        <label>快照修订 ID<input id="snapshot-id" type="text" required autocomplete="off"></label>
        <label>信息截止日<input id="cutoff" type="date" required></label>
        <label>记录时间（UTC）<input id="recorded-at" type="datetime-local" required></label>
        <button type="submit">加载快照</button>
      </form>
      <p id="status" role="status" aria-live="polite"></p>
    </section>
    <section id="summary" class="panel hidden"><h2>快照摘要</h2><dl id="summary-grid" class="summary-grid"></dl></section>
    <section id="top-section" class="panel hidden"><h2>重点候选</h2><div id="top-candidates" class="cards"></div></section>
    <section id="universe-section" class="panel hidden">
      <h2>完整受益公司池</h2>
      <div class="table-wrap"><table>
        <thead><tr><th>顺序</th><th>公司</th><th>产业受益</th><th>候选状态</th><th>最终分</th><th>业务质量</th><th>风险扣分</th><th>原因</th></tr></thead>
        <tbody id="universe-body"></tbody>
      </table></div>
      <div id="member-details"></div>
    </section>
  </main>
  <script src="/investment-candidates/static/investment_candidates.js" defer></script>
</body>
</html>
