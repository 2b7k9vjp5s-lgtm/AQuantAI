name: Full Suite Diagnostic

on:
  pull_request:

jobs:
  capture-full-suite:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aquantai
          POSTGRES_PASSWORD: aquantai
          POSTGRES_DB: aquantai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aquantai -d aquantai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://aquantai:aquantai@127.0.0.1:5432/aquantai_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies quietly
        run: python -m pip install -q -e ".[dev]"
      - name: Capture full pytest output
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=long > full-suite-diagnostic.log 2>&1
          echo "$?" > full-suite-diagnostic.exit-code
          exit 0
      - name: Upload full diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-diagnostic
          path: |
            full-suite-diagnostic.log
            full-suite-diagnostic.exit-code
          if-no-files-found: error
