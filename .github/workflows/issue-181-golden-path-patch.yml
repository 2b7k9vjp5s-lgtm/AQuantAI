name: Issue 181 Golden Path Patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.number == 182
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - run: python .codex/tools/apply_issue_181_golden_path_patch.py
      - shell: bash
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tests/test_investment_candidate_commands.py
            git commit -m "test: make investment candidate golden path append-only"
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          fi
