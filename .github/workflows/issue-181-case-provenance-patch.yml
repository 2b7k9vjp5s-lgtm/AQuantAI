name: Issue 181 Case Provenance Patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.number == 182
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply reviewed patch
        shell: bash
        run: |
          set +e
          python .codex/tools/apply_issue_181_case_provenance_patch.py > case-provenance-patch.log 2>&1
          status=$?
          cat case-provenance-patch.log
          exit $status
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-181-case-provenance-diagnostics
          path: |
            case-provenance-patch.log
            industry_alpha/investment_candidate_commands.py
          retention-days: 1
      - name: Commit reviewed patch
        shell: bash
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add industry_alpha/investment_candidate_commands.py
            git commit -m "fix: validate component evidence within exact research case"
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          fi
