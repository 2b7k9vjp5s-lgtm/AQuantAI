name: Local Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  export-canonical-price-owner:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload canonical price owner
        uses: actions/upload-artifact@v4
        with:
          name: canonical-price-query-owner
          path: backend/database/canonical_price.py
