name: Local Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pytest-and-demo:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aquantai
          POSTGRES_PASSWORD: aquantai
          POSTGRES_DB: aquantai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aquantai -d aquantai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://aquantai:aquantai@127.0.0.1:5432/aquantai_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -q -e ".[dev]"

      - name: Run tests
        run: python -m pytest -x -q --tb=short > pytest-output.txt 2>&1

      - name: Upload pytest diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-194-full-suite-output
          path: pytest-output.txt
          if-no-files-found: error
          retention-days: 1

      - name: Run local fixture demo
        run: python -m scripts.demo_research_flow
