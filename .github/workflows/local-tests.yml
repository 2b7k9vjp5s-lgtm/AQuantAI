name: Local Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  today-market-catalog-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Clone implementation branch quietly
        run: git clone -q --depth 1 --branch feat/personal-research-workbench-ui-phase2a https://github.com/2b7k9vjp5s-lgtm/AQuantAI.git .

      - name: Install dependencies quietly
        run: python3 -m pip install -q -e ".[dev]"

      - name: Run populated Today Market catalog test
        run: python3 -m pytest -q tests/test_today_market.py -k "catalog_lists" --tb=line

  pytest-and-demo:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aquantai
          POSTGRES_PASSWORD: aquantai
          POSTGRES_DB: aquantai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aquantai -d aquantai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://aquantai:aquantai@127.0.0.1:5432/aquantai_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -q -e ".[dev]"

      - name: Run Today Market input and database tests
        run: python -m pytest -q tests/test_today_market.py -k "boundaries_fail or database_configuration" --tb=short

      - name: Run Today Market empty catalog test
        run: python -m pytest -q tests/test_today_market.py -k "empty_catalog" --tb=short

      - name: Run Today Market populated catalog test
        run: python -m pytest -q tests/test_today_market.py -k "catalog_lists" --tb=short

      - name: Run Today Market chronology tests
        run: python -m pytest -q tests/test_today_market.py -k "recorded_boundary or legacy_repository" --tb=short

      - name: Run Today Market snapshot tests
        run: python -m pytest -q tests/test_today_market.py -k "snapshot_golden" --tb=short

      - name: Run Today Market page tests
        run: python -m pytest -q tests/test_today_market.py -k "today_market_page or static_assets" --tb=short

      - name: Run tests
        run: python -m pytest -q --tb=short

      - name: Run local fixture demo
        run: python -m scripts.demo_research_flow

      - name: Run personal workbench fixture demo
        run: python -m scripts.demo_industry_analysis_workbench

      - name: Run candidate universe fixture demo
        run: python -m scripts.demo_industry_analysis_candidates

      - name: Run candidate review and exact result fixture demo
        run: python -m scripts.demo_industry_analysis_review

      - name: Run Today Market local snapshot fixture demo
        run: python -m scripts.demo_today_market
