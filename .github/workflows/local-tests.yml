name: Local Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workbench-focused:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -q -e ".[dev]"

      - name: Run focused workbench tests
        run: >-
          python -m pytest -q --tb=short
          tests/test_industry_analysis_api.py
          tests/test_industry_thesis_workbench.py

      - name: Run personal workbench fixture demo
        run: python -m scripts.demo_industry_analysis_workbench

  pytest-and-demo:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aquantai
          POSTGRES_PASSWORD: aquantai
          POSTGRES_DB: aquantai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aquantai -d aquantai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://aquantai:aquantai@127.0.0.1:5432/aquantai_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -q -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q --tb=short

      - name: Run local fixture demo
        run: python -m scripts.demo_research_flow

      - name: Run personal workbench fixture demo
        run: python -m scripts.demo_industry_analysis_workbench
