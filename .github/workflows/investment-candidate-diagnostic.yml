name: Investment Candidate Diagnostic

on:
  push:
    branches:
      - diagnostic/investment-candidate-focused

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -q -e ".[dev]"
      - name: Compile new modules
        run: python -m compileall -q industry_alpha/investment_candidate_*.py backend/api/investment_candidate.py scripts/record_investment_candidate_*.py
      - name: Run focused tests
        run: python -m pytest -q --tb=short tests/test_investment_candidate_rules.py tests/test_investment_candidate_models.py tests/test_investment_candidate_migration.py
