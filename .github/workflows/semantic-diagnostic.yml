name: Semantic Diagnostic

on:
  pull_request:

jobs:
  focused-semantic-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies quietly
        run: python -m pip install -q -e ".[dev]"
      - name: Capture focused failures
        shell: bash
        run: |
          set +e
          python -m pytest -q \
            tests/test_beneficiary_semantics.py::test_cli_dry_run_is_local_and_redacts_input_path \
            tests/test_beneficiary_semantics_api.py \
            --tb=long > semantic-diagnostic.log 2>&1
          echo "$?" > semantic-diagnostic.exit-code
          exit 0
      - name: Upload focused diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: semantic-diagnostic
          path: |
            semantic-diagnostic.log
            semantic-diagnostic.exit-code
          if-no-files-found: error
